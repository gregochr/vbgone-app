<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#282828;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5a00d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc8a00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (transparent to match app header) -->
  <rect x="0" y="0" width="480" height="100" rx="12" ry="12" fill="none"/>

  <!-- VB badge — legacy, faded -->
  <rect x="16" y="18" width="60" height="64" rx="6" ry="6" fill="#e5a00d" opacity="0.08"/>
  <rect x="16" y="18" width="60" height="64" rx="6" ry="6" fill="none" stroke="#e5a00d" stroke-width="1.5" opacity="0.4"/>
  <text x="46" y="60" font-family="'Open Sans', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#e5a00d" text-anchor="middle" opacity="0.5">VB</text>

  <!-- Strike-through on VB badge -->
  <line x1="13" y1="88" x2="79" y2="12" stroke="#e5a00d" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>

  <!-- Arrow — Plex yellow -->
  <line x1="90" y1="50" x2="132" y2="50" stroke="#e5a00d" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <polygon points="126,43 142,50 126,57" fill="#e5a00d" opacity="0.8"/>

  <!-- C# badge — bright Plex yellow -->
  <rect x="152" y="18" width="60" height="64" rx="6" ry="6" fill="#e5a00d" opacity="0.12"/>
  <rect x="152" y="18" width="60" height="64" rx="6" ry="6" fill="none" stroke="#e5a00d" stroke-width="1.5" opacity="0.9"/>
  <text x="182" y="60" font-family="'Open Sans', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#e5a00d" text-anchor="middle" filter="url(#glow)">C#</text>

  <!-- Divider -->
  <line x1="228" y1="22" x2="228" y2="78" stroke="#3a3a3a" stroke-width="1"/>

  <!-- VBGone wordmark -->
  <text x="244" y="57" font-family="'Open Sans', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="-0.5">VB</text>
  <text x="287" y="57" font-family="'Open Sans', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="300" fill="#e5a00d" letter-spacing="-0.5" filter="url(#glow)">Gone</text>

  <!-- Tagline -->
  <text x="244" y="77" font-family="'Open Sans', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#9b9b9b" letter-spacing="1.2">AI-ASSISTED VB.NET MIGRATION</text>
</svg>
